<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<!-- 🔥 TU CSS -->
<link rel="stylesheet" href="../css/shared.css">
<link rel="stylesheet" href="../css/login.css">

<title>SmartMeal - Login</title>
</head>

<body class="bg-[#f5f8f5] dark:bg-[#102210] font-['Be_Vietnam_Pro',sans-serif]">


<div class="relative flex min-h-screen w-full flex-col items-center justify-center px-5 py-10 overflow-x-hidden">

  <!-- ... (tus divs de decoración se quedan igual) ... -->
  <div class="fixed top-0 right-0 -translate-y-1/3 translate-x-1/3 w-72 h-72 bg-[#0df20d]/8 rounded-full blur-3xl pointer-events-none"></div>
  <div class="fixed bottom-0 left-0 translate-y-1/3 -translate-x-1/3 w-72 h-72 bg-[#0df20d]/8 rounded-full blur-3xl pointer-events-none"></div>

  <div class="flex flex-col items-center mb-8">
    <!-- ... (tu logo y título se quedan igual) ... -->
    <div class="relative mb-4 flex h-20 w-20 items-center justify-center rounded-2xl bg-[#0df20d]/10 border border-[#0df20d]/20 shadow-sm">
      <span class="material-symbols-outlined text-[#0df20d] !text-5xl">restaurant_menu</span>
    </div>
    <h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold">SmartMeal</h1>
    <p class="text-[#0df20d] text-sm font-semibold mt-1">Tu menú inteligente</p>
  </div>

  <div class="w-full max-w-sm bg-white dark:bg-[#1a2e1a] rounded-2xl shadow-xl border border-[#0df20d]/10 overflow-hidden">

    <div class="flex p-2 gap-1 bg-slate-100 dark:bg-[#142214] m-3 rounded-xl">
      <button onclick="switchTab('login')" id="tab-login" class="flex-1 py-2.5 text-sm tab-active">
        Iniciar sesión
      </button>
      <button onclick="switchTab('register')" id="tab-register" class="flex-1 py-2.5 text-sm tab-inactive">
        Registrarse
      </button>
    </div>

    <div class="px-5 pb-6 pt-2">

      <!-- FORMULARIO DE LOGIN -->
      <div id="form-login" class="form-section active">
        <!-- AGREGUÉ LOS name="..." -->
        <input type="email" name="email" placeholder="Correo" class="input-field" id="login-email">
        <input type="password" name="password" placeholder="Contraseña" class="input-field" id="login-pass">

        <!-- AGREGUÉ onclick="iniciarSesion()" -->
        <button class="btn-primary" onclick="iniciarSesion()">Iniciar sesión</button>
      </div>

      <!-- FORMULARIO DE REGISTRO -->
      <div id="form-register" class="form-section">
        <!-- AGREGUÉ LOS name="..." -->
        <input type="text" name="nombre" placeholder="Nombre" class="input-field" id="reg-nombre">
        <input type="email" name="email" placeholder="Correo" class="input-field" id="reg-email">
        <input type="password" name="password" placeholder="Contraseña" class="input-field" id="reg-pass">

        <!-- AGREGUÉ onclick="registrarse()" -->
        <button class="btn-primary" onclick="registrarse()">Crear cuenta</button>
      </div>

    </div>
  </div>

</div>

<!-- AGREGUÉ ESTE SCRIPT PARA CONECTAR CON EL BACKEND -->
<script>
function switchTab(tab) {
  const loginForm = document.getElementById('form-login');
  const registerForm = document.getElementById('form-register');
  const tabLogin = document.getElementById('tab-login');
  const tabRegister = document.getElementById('tab-register');

  if (tab === 'login') {
    loginForm.classList.add('active');
    registerForm.classList.remove('active');
    tabLogin.classList.add('tab-active');
    tabLogin.classList.remove('tab-inactive');
    tabRegister.classList.add('tab-inactive');
    tabRegister.classList.remove('tab-active');
  } else {
    registerForm.classList.add('active');
    loginForm.classList.remove('active');
    tabRegister.classList.add('tab-active');
    tabRegister.classList.remove('tab-inactive');
    tabLogin.classList.add('tab-inactive');
    tabLogin.classList.remove('tab-active');
  }
}

// FUNCIÓN PARA REGISTRARSE
async function registrarse() {
    const nombre = document.getElementById('reg-nombre').value;
    const email = document.getElementById('reg-email').value;
    const password = document.getElementById('reg-pass').value;

    const res = await fetch('http://localhost:4000/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, email, password })
    });

    const data = await res.json();
    if (data.mensaje) {
        alert('✅ Registrado correctamente. Ahora inicia sesión.');
        switchTab('login');
    } else {
        alert('❌ Error: ' + data.error);
    }
}

// FUNCIÓN PARA INICIAR SESIÓN
async function iniciarSesion() {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-pass').value;

    const res = await fetch('http://localhost:4000/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
    });

      const data = await res.json();
    if (data.mensaje) {
        // 1. Guardamos el nombre para recordarlo
        localStorage.setItem('usuarioSmartMeal', data.nombre);
        localStorage.setItem('usuarioId', data.usuarioId);  
        // 2. Redirigimos a la página de perfil
        window.location.href = '/food-entry';
    } else {
        alert('❌ Error: ' + data.error);
    }
}
</script>

</body>
